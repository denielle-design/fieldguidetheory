<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Field Guide Theory study workbook for NQF2 Nature Site Guide preparation. 20 lessons covering ecology, botany, birds, mammals, tracking, and conservation.">
<title>Field Guide Theory — Study Workbook</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap');

:root {
  --paper:     #F6F2EB;
  --paper-2:   #EDE8DF;
  --paper-3:   #E0D8CB;
  --ink:       #1C1811;
  --ink-2:     #3D3727;
  --ink-3:     #6A6050;
  --ochre:     #8A5C18;
  --ochre-dim: rgba(138,92,24,0.35);
  --sage:      #3E5540;
  --rust:      #7C3321;
  --line:      rgba(28,24,17,0.08);
  --line-2:    rgba(28,24,17,0.15);
  --sidebar-w: 256px;
  --radius:    3px;

  --t-xs:   0.6875rem;
  --t-sm:   0.8125rem;
  --t-base: 0.9375rem;
  --t-md:   1.0625rem;
  --t-lg:   1.5rem;
  --t-xl:   2rem;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; scroll-behavior: smooth; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  font-size: var(--t-base);
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
  color-scheme: light only;
}

/* Global focus ring — keyboard accessibility */
:focus-visible {
  outline: 2px solid var(--ochre);
  outline-offset: 2px;
}
button:focus:not(:focus-visible),
a:focus:not(:focus-visible) { outline: none; }

/* ===== SIDEBAR ===== */

.sidebar {
  position: fixed;
  top: 0; left: 0; bottom: 0;
  width: var(--sidebar-w);
  background: var(--ink);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  z-index: 100;
}

.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }

.sidebar-head {
  padding: 1.75rem 1.5rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}

.sidebar-title {
  font-family: 'DM Sans', sans-serif;
  font-size: var(--t-sm);
  font-weight: 600;
  color: rgba(246,242,235,0.92);
  line-height: 1.4;
  letter-spacing: 0.01em;
  margin-bottom: 0.2rem;
}

.sidebar-sub {
  font-size: var(--t-xs);
  color: rgba(246,242,235,0.42);
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 400;
}

.sidebar-progress {
  padding: 1rem 1.5rem 1.1rem;
  border-bottom: 1px solid rgba(255,255,255,0.07);
}

.progress-track {
  height: 2px;
  background: rgba(255,255,255,0.09);
  border-radius: 1px;
  margin-bottom: 0.45rem;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: rgba(184,128,56,0.8);
  border-radius: 1px;
  transition: width 0.4s ease;
  width: 0%;
}

.progress-text {
  font-size: var(--t-xs);
  color: rgba(246,242,235,0.72);
  letter-spacing: 0.02em;
  font-weight: 500;
}

.nav-group {
  padding: 0.6rem 0 0.25rem;
}

.nav-group-label {
  font-size: var(--t-xs);
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: rgba(246,242,235,0.55);
  font-weight: 600;
  padding: 0 1.5rem;
  margin-bottom: 0.2rem;
}

.nav-item {
  display: flex;
  align-items: flex-start;
  gap: 0.55rem;
  padding: 0.55rem 1.5rem;
  cursor: pointer;
  transition: background 0.12s;
  border-left: 2px solid transparent;
  min-height: 44px;
}

.nav-item:hover { background: rgba(255,255,255,0.035); }

.nav-item.active {
  background: rgba(255,255,255,0.055);
  border-left-color: rgba(184,128,56,0.75);
}

.nav-item-num {
  font-size: var(--t-xs);
  color: rgba(246,242,235,0.45);
  width: 1.15rem;
  flex-shrink: 0;
  margin-top: 0.15rem;
  font-variant-numeric: tabular-nums;
}

.nav-item.active .nav-item-num { color: rgba(184,128,56,0.8); }

.nav-item-text {
  font-size: var(--t-sm);
  font-weight: 400;
  color: rgba(246,242,235,0.78);
  line-height: 1.45;
}

.nav-item.active .nav-item-text { color: rgba(246,242,235,0.95); font-weight: 600; }

.nav-item-check {
  margin-left: auto;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--sage);
  flex-shrink: 0;
  margin-top: 0.35rem;
  opacity: 0;
  transition: opacity 0.2s;
}

.nav-item.completed .nav-item-check { opacity: 1; }
.nav-item.completed .nav-item-text { color: rgba(246,242,235,0.35); }

/* ===== MAIN ===== */

.main {
  margin-left: var(--sidebar-w);
  min-height: 100vh;
  background: var(--paper);
}

.lesson-page {
  max-width: 660px;
  margin: 0 auto;
  padding: 3.5rem 2.25rem 6rem;
  display: none;
}

.lesson-page.active { display: block; }

/* ===== LESSON HEADER ===== */

.lesson-title {
  /* Lora used ONLY here and nowhere else */
  font-family: 'Lora', serif;
  font-size: var(--t-xl);
  font-weight: 600;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 1rem;
}

.lesson-purpose {
  font-family: 'DM Sans', sans-serif;
  font-size: var(--t-md);
  font-weight: 400;
  color: var(--ink-2);
  line-height: 1.65;
  border-left: 2px solid var(--ochre);
  padding-left: 1rem;
  margin-bottom: 2.75rem;
}

/* ===== SECTIONS ===== */
.section { margin-bottom: 3rem; }

/* Section label: small caps weight, no rule line */
.section-label {
  font-size: var(--t-xs);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ochre);
  font-weight: 500;
  margin-bottom: 1.1rem;
  font-family: 'DM Sans', sans-serif;
}

.body-text {
  font-size: var(--t-base);
  color: var(--ink-2);
  line-height: 1.82;
  font-weight: 300;
}

.body-text + .body-text { margin-top: 0.9rem; }

/* ===== FIELD SCENE ===== */

/* Drop the box entirely. Treat as indented pull text. */
.field-scene {
  margin: 0 0 2.75rem;
  padding-left: 1.5rem;
  border-left: 1px solid rgba(138,92,24,0.35);
}

.field-scene-label {
  font-size: var(--t-xs);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--ochre);
  font-weight: 600;
  margin-bottom: 0.75rem;
  opacity: 0.7;
}

.field-scene-text {
  font-family: 'Lora', serif;
  font-style: italic;
  font-weight: 400;
  font-size: var(--t-base);
  color: var(--ink-2);
  line-height: 1.75;
}

/* ===== NOTICE LIST ===== */

/* Clean numbered list — no bullets, no dots, no component feel */
.notice-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.notice-item {
  padding: 1.1rem 0;
  border-bottom: 1px solid var(--line);
}

.notice-item:first-child { border-top: 1px solid var(--line); }

.notice-strong {
  font-family: 'DM Sans', sans-serif;
  font-size: var(--t-base);
  font-weight: 500;
  color: var(--ink);
  display: block;
  margin-bottom: 0.3rem;
  line-height: 1.45;
}

.notice-detail {
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.78;
  font-weight: 300;
}

/* ===== COMPARE TABLE ===== */
.compare-table {
  width: 100%;
  border-collapse: collapse;
  font-size: var(--t-sm);
  margin-top: 0.5rem;
}

.compare-table thead th {
  padding: 0.7rem 0.85rem 0.6rem;
  text-align: left;
  font-weight: 600;
  font-size: var(--t-sm);
  color: var(--ink);
  background: var(--paper-2);
  border-bottom: 2px solid var(--line-2);
}

.compare-table thead th:first-child {
  width: 30%;
  color: var(--ink-3);
  font-weight: 500;
  font-size: var(--t-xs);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border-right: 1px solid var(--line-2);
}

.compare-table thead th.col-a {
  border-right: 1px solid var(--line);
}

.compare-table thead th.col-b {
  background: var(--paper-3);
}

.compare-table tbody tr {
  border-bottom: 1px solid var(--line);
}

.compare-table tbody tr:last-child {
  border-bottom: none;
}

.compare-table tbody td {
  padding: 0.65rem 0.85rem;
  vertical-align: top;
  color: var(--ink-2);
  line-height: 1.6;
}

.compare-table tbody td:first-child {
  font-size: var(--t-xs);
  font-weight: 600;
  color: var(--ink-3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: var(--paper-2);
  border-right: 1px solid var(--line-2);
  white-space: nowrap;
}

.compare-table tbody td.col-a {
  border-right: 1px solid var(--line);
}

.compare-table tbody td.col-b {
  background: rgba(246,242,235,0.4);
}

.compare-table tbody tr:nth-child(even) td.col-b {
  background: transparent;
}

/* header image cells */
.compare-table thead .compare-img-cell {
  padding: 0;
  vertical-align: bottom;
}
.compare-table thead .compare-img-cell img,
.compare-table thead .compare-img-cell .img-placeholder {
  display: block;
  width: 100%;
  height: 72px;
  object-fit: cover;
  border-radius: 0;
}
.compare-table thead .compare-img-cell .img-placeholder {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--paper-3);
  color: var(--ink-3);
  font-size: var(--t-xs);
  font-style: italic;
}
.compare-table thead .compare-img-cell .compare-th-label {
  padding: 0.55rem 0.85rem 0.6rem;
  font-weight: 600;
  font-size: var(--t-sm);
  color: var(--ink);
}

/* Legacy grid — keep so nothing breaks if referenced */
.compare-grid { display: none; }
.compare-cell { display: none; }

/* ===== MISTAKE BOX ===== */
.mistake-box {
  border-left: 2px solid var(--rust);
  padding: 0.9rem 1rem;
  background: var(--paper-2);
  border-radius: var(--radius);
}

.mistake-label {
  font-size: var(--t-xs);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--rust);
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.mistake-text {
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.75;
  font-style: italic;
}

/* ===== KNOWLEDGE CHECK ===== */
.check-section {
  background: transparent;
  border: none;
  padding: 0;
  margin-bottom: 3rem;
}

.check-header {
  font-size: var(--t-xs);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ochre);
  font-weight: 600;
  margin-bottom: 1.5rem;
}

.question + .question {
  margin-top: 2.25rem;
  padding-top: 2.25rem;
  border-top: 1px solid var(--line);
}

.question-text {
  font-size: var(--t-base);
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 1rem;
  line-height: 1.65;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 0;
  border-top: 1px solid var(--line);
}

.option-btn {
  text-align: left;
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--line);
  padding: 0.85rem 0.5rem 0.85rem 0;
  font-family: 'DM Sans', sans-serif;
  font-size: var(--t-sm);
  color: var(--ink-2);
  cursor: pointer;
  transition: color 0.12s, padding-left 0.12s, background 0.12s;
  line-height: 1.55;
  width: 100%;
  display: flex;
  align-items: baseline;
  gap: 0.6rem;
  min-height: 44px;
}

.option-btn::before {
  content: attr(data-letter);
  font-size: var(--t-xs);
  color: var(--ink-3);
  font-weight: 700;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  min-width: 1rem;
}

.option-btn:hover:not([disabled]) {
  color: var(--ink);
  padding-left: 0.4rem;
}

.option-btn.correct {
  color: var(--sage);
  font-weight: 600;
}
.option-btn.correct::before { color: var(--sage); }

.option-btn.wrong {
  color: var(--ink-3);
  text-decoration: line-through;
  text-decoration-color: rgba(28,24,17,0.25);
}

.option-btn.revealed { cursor: default; }
.option-btn.revealed:hover { padding-left: 0; }

.answer-reveal {
  margin-top: 1rem;
  padding: 0.9rem 1rem;
  border-radius: var(--radius);
  background: var(--paper-2);
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.75;
  display: none;
  border-left: 2px solid var(--sage);
}
.answer-reveal.show { display: block; }

/* ===== DRILL ===== */
.drill-box {
  border-left: 2px solid var(--sage);
  padding: 0.9rem 1rem;
  background: var(--paper-2);
  border-radius: var(--radius);
}

.drill-label {
  font-size: var(--t-xs);
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--sage);
  font-weight: 600;
  margin-bottom: 0.5rem;
}

.drill-text {
  font-size: var(--t-sm);
  color: var(--ink-2);
  line-height: 1.75;
}

/* ===== LESSON FOOTER ===== */

.lesson-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 2.5rem;
  margin-top: 2.5rem;
  border-top: 1px solid var(--line);
  gap: 1rem;
  flex-wrap: wrap;
}

.mark-done-btn {
  background: var(--ink);
  color: rgba(246,242,235,0.92);
  border: none;
  padding: 0.7rem 1.5rem;
  font-family: 'DM Sans', sans-serif;
  font-size: var(--t-sm);
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
  letter-spacing: 0.03em;
  border-radius: var(--radius);
  min-height: 44px;
}

.mark-done-btn:hover { background: var(--ink-2); }
.mark-done-btn.done { background: var(--sage); }

.nav-arrows {
  display: flex;
  gap: 0.5rem;
}

.nav-arrow {
  background: transparent;
  border: 1px solid var(--line-2);
  color: var(--ink-2);
  padding: 0.6rem 1rem;
  font-family: 'DM Sans', sans-serif;
  font-size: var(--t-sm);
  font-weight: 500;
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
  border-radius: var(--radius);
  min-height: 44px;
}

.nav-arrow:hover {
  border-color: var(--ochre);
  color: var(--ochre);
}

.nav-arrow:disabled {
  opacity: 0.2;
  cursor: not-allowed;
}

/* ===== OVERLAY ===== */

.sheet-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);
  z-index: 90;
  backdrop-filter: blur(2px);
}
.sheet-overlay.visible { display: block; }

/* ===== MOBILE TOP BAR ===== */

.mob-topbar {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 52px;
  background: var(--ink);
  z-index: 100;
  align-items: center;
  padding: 0 1rem;
  gap: 0.75rem;
}
.mob-topbar-lesson { flex: 1; min-width: 0; }
.mob-topbar-group {
  font-size: var(--t-xs);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: rgba(246,242,235,0.58);
  margin-bottom: 0.1rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mob-topbar-title {
  font-size: var(--t-sm);
  font-weight: 600;
  color: rgba(246,242,235,0.97);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mob-topbar-btn {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  background: var(--ochre);
  border: none;
  color: rgba(246,242,235,0.97);
  font-family: 'DM Sans', sans-serif;
  font-size: var(--t-xs);
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0.5rem 1rem;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.15s;
  border-radius: var(--radius);
  min-height: 44px;
}
.mob-topbar-btn:hover { background: #7A5016; }
.mob-topbar-btn svg { width: 13px; height: 13px; opacity: 0.92; flex-shrink: 0; }

/* ===== BOTTOM SHEET ===== */

.bottom-sheet {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--paper);
  z-index: 110;
  border-top: 1px solid var(--line-2);
  max-height: 88vh;
  overflow-y: auto;
  transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
  border-radius: 14px 14px 0 0;
}
.bottom-sheet.open { transform: translateY(0); }
.bottom-sheet::-webkit-scrollbar { width: 3px; }
.bottom-sheet::-webkit-scrollbar-thumb { background: var(--line-2); }

.sheet-handle-row {
  display: flex;
  align-items: center;
  padding: 1.25rem 1.5rem 1rem;
  border-bottom: 1px solid var(--line);
  position: sticky;
  top: 0;
  background: var(--paper);
  z-index: 1;
  gap: 0.75rem;
  border-radius: 14px 14px 0 0;
}
.sheet-handle {
  width: 36px; height: 3px;
  background: var(--line-2);
  border-radius: 2px;
  position: absolute;
  left: 50%; transform: translateX(-50%);
  top: 0.6rem;
}
.sheet-heading { font-size: var(--t-base); font-weight: 600; color: var(--ink); }
.sheet-progress-text { font-size: var(--t-xs); color: var(--ink-2); margin-left: auto; font-weight: 500; }
.sheet-close {
  background: var(--paper-3);
  border: none;
  color: var(--ink-2);
  cursor: pointer;
  font-size: var(--t-xs);
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0.5rem 0.7rem;
  font-family: 'DM Sans', sans-serif;
  transition: background 0.12s;
  border-radius: var(--radius);
  min-height: 36px;
}
.sheet-close:hover { background: var(--paper-2); color: var(--ink); }

.sheet-body { padding: 0 0 3rem; }
.sheet-group { margin-bottom: 0; }

/* Group heading: proper weight, not a faint label */
.sheet-group-label {
  font-size: var(--t-xs);
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-3);
  font-weight: 600;
  padding: 1.25rem 1.5rem 0.4rem;
}

/* No grid — single column list */
.sheet-cards { display: block; }

.sheet-card {
  display: flex;
  align-items: baseline;
  gap: 0.9rem;
  padding: 0.75rem 1.5rem;
  cursor: pointer;
  border: none;
  background: transparent;
  border-radius: 0;
  border-bottom: 1px solid var(--line);
  transition: background 0.1s;
  position: relative;
  overflow: visible;
  min-height: 0;
}

/* Remove the coloured top bar entirely */
.sheet-card::before { display: none; }

.sheet-card:hover { background: var(--paper-2); }

.sheet-card.active {
  background: var(--paper-2);
}

/* Left-edge accent for active only — thin, clean */
.sheet-card.active::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 2px;
  background: var(--ochre);
}

.sheet-card-num {
  font-size: var(--t-xs);
  color: var(--ink-3);
  font-variant-numeric: tabular-nums;
  font-weight: 500;
  flex-shrink: 0;
  min-width: 1.5rem;
  padding-top: 0.1rem;
}

.sheet-card.active .sheet-card-num { color: var(--ochre); }

.sheet-card-title {
  font-size: var(--t-base);
  color: var(--ink);
  line-height: 1.4;
  flex: 1;
}

.sheet-card.active .sheet-card-title { font-weight: 500; }
.sheet-card.completed .sheet-card-title { color: var(--ink-3); }

.sheet-card-done {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--sage);
  flex-shrink: 0;
  opacity: 0;
  transition: opacity 0.2s;
  position: relative;
  bottom: auto; right: auto;
  margin-top: 0.35rem;
}

.sheet-card.completed .sheet-card-done { opacity: 1; }

/* ===== SPECIES IMAGES ===== */

.notice-img-wrap {
  display: flex;
  gap: 0.75rem;
  flex-wrap: wrap;
  margin-top: 0.6rem;
}
.notice-img-block {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
  align-items: center;
  flex-shrink: 0;
}
.notice-img {
  width: 90px;
  height: 68px;
  object-fit: cover;
  border-radius: 3px;
  background: var(--paper-3);
  display: block;
}
.notice-img-caption {
  font-size: var(--t-xs);

function resolveAllImages() {
  document.querySelectorAll('img[data-wiki]').forEach(img => {
    const key = (img.getAttribute('data-wiki') || '').toLowerCase();
    const qid = SPECIES_QIDS[key];
    if (qid) {
      img.src = `/api/species-image?q=${qid}`;
    } else {
      imgFallback(img);
    }
  });
}

function imgFallback(img) {
  const span = document.createElement('span');
  span.className = 'img-placeholder';
  span.textContent = img.alt || 'Image unavailable';
  if (img.parentNode) img.parentNode.insertBefore(span, img.nextSibling);
  img.style.display = 'none';
}

function imgError(img) { imgFallback(img); }

const lessons = [

// ---- GROUP 1: ORIENTATION ----
{

      explanation: "Impala rut occurs between May and July in southern Africa, coinciding with the late dry season. Dominant rams hold harems and expend enormous energy in the process: they may lose significant body condition during rut. The timing is important: calves born approximately seven months later arrive in the wet season when grass is most nutritious, maximising calf survival."
    }
  ],
  drill: "Find a wildlife documentary or YouTube footage showing lions, elephants, or buffalo at a waterhole for at least 10 continuous minutes. Watch it twice: first normally, then with the sound off, narrating what you see as if to guests: describing body language, social interactions, and what you think will happen next. Notice what you miss when you are not speaking."
},

// ---- GROUP 6: ANIMAL BEHAVIOUR ----
{
  id: 10,
  group: "Animal Behaviour",
  title: "Reading Behaviour in the Field",
  purpose: "Interpret what animals are doing in real time: so that every sighting produces a story, not just an identification.",
  scene: "A herd of zebra are grazing calmly about 200 metres from the vehicle. Then, in sequence: one animal at the back raises its head and looks south. A second one stops eating and turns the same way. Within ten seconds, six more zebras are facing south, and the herd has compacted slightly. You have not seen anything to the south yet. But you know something is there.",
  notices: [
    { strong: "Alarm posture spreads through a herd in a wave", detail: "When one prey animal detects a potential threat, head-up alert posture is highly contagious. Animals orient toward the threat without having independently detected it: they are taking information from their neighbours. A wave of alert spreading through a stationary herd almost always indicates something has moved nearby." },
    { strong: "Displacement behaviours reveal internal conflict", detail: "When an animal is simultaneously attracted to and wary of something, it may engage in an apparently unrelated behaviour: grazing suddenly in an alert situation, grooming at an unexpected moment, or yawning. These displacement activities are signs of conflict and tension, not relaxation. They tell you the animal has not resolved the situation yet." },
    { strong: "Approach versus avoid is the core decision every prey animal makes", detail: "Every moment a prey animal spends at a waterhole, near a tree line, or in open ground is an approach-avoid calculation: the benefit of drinking or feeding versus the cost of predation risk. Understanding this trade-off explains why impala bunch before entering water, why buffalo mills around before crossing an open space, and why zebra come to water in large groups at peak predator activity hours." },
    { strong: "Predator behaviour has its own vocabulary", detail: "A lion lying with head up and eyes tracking = active attention. A lion crouching with head low and weight shifting forward = committed stalk. A lion lying completely flat with no eye movement = genuinely resting. These are not subtle differences: they are visible at 100 metres if you know what to look for." }
  ],
  mattersText: "Animal behaviour is what your guests will talk about when they get home. Not 'we saw a lion': but 'the lion was watching something we could not see, and then suddenly it started moving, and we realised it had been tracking an impala for twenty minutes without any of us noticing.' This kind of story requires you to be reading behaviour actively, not waiting for obvious action.",
  compareGrid: {
    heading: ["Genuine alarm (real threat present)", "False alarm / social tension"],
    rows: [
      ["Alert posture spreads through herd rapidly", "One or two animals alert, others continue grazing"],
      ["Animals orient toward a specific point", "Animals look in multiple directions"],
      ["Snorting, stamping, compressed group", "Loose group, ongoing feeding"],
      ["Flight response may follow quickly", "Group typically relaxes within minutes"],
      ["Other species nearby also alert", "Other species unaffected"]
    ]
  },
  mistake: "Beginning guides often say an animal is 'nervous' without specifying what it is nervous about or whether the alarm is genuine. 'The buffalo seem alert' is weaker than 'the buffalo near the waterhole have detected something to the west: notice their ears are forward and the cows are moving the calves to the centre of the group.' Precision makes your commentary more watchable.",
  quiz: [
    {
      q: "You are watching a pride of lions rest in the shade at 11am. All animals appear to be sleeping. Then one lioness opens her eyes and turns her head slowly to the east without raising it from the ground. She does not move further. What is the most accurate interpretation?",
      options: [
        "She is waking up from sleep.",
        "She has detected movement or sound to the east and is processing it at minimal energy cost: she is not alarmed but she is aware.",
        "She is looking for shade.",
        "This is normal involuntary movement during sleep."
      ],
      correct: 1,
      explanation: "Keeping the head on the ground while redirecting the eyes is a low-energy vigilance posture. She is aware of something without committing to full alert: a classic energy-conserving behaviour. If the stimulus persists or increases, she may raise her head. If it passes, she goes back to rest. Watching for what she does next is the story."
    },
    {
      q: "A large male elephant is browsing peacefully about 30 metres from the road. He is facing away from the vehicle. He suddenly stops, raises his trunk, and turns to face the vehicle. He takes one step forward with head raised and ears spread. What is the appropriate response?",
      options: [
        "This is a bluff. Hold your ground.",
        "Reverse slowly and steadily, speak calmly to guests, cut the engine if you stop.",
        "Drive forward: a direct approach sometimes defuses tension.",
        "Turn the vehicle sideways to appear larger."
      ],
      correct: 1,
      explanation: "Head raised, ears spread, facing the vehicle directly is an assessment posture that can precede a charge. Reversing slowly and steadily reduces the perception of threat. Cutting the engine if you stop can help because engine noise increases threat perception. Speak calmly to guests: their panic transmits to you and affects your decision-making. Never drive toward a displaying elephant."
    }
  ],
  drill: "Find 20 minutes of uncut wildlife footage: not a documentary with narration, but raw footage. Watch it with the sound muted. For the first 10 minutes, narrate out loud what every animal is doing. For the second 10 minutes, only narrate when you can also say why. Give a reason for every behaviour you describe. Notice the difference in the quality of your narration between the two halves."
},

// ---- Stubs for remaining modules ----
{
  id: 11,
  group: "Tracking and Field Signs",
  title: "Tracking: Reading What Passed",
  purpose: "Interpret the physical evidence animals leave behind so that a bare patch of ground tells a story as clearly as the animal itself.",
  scene: "You arrive at a dry riverbed crossing before dawn. There are no animals visible. But in the dust and sand around you, the ground is a map of the previous twelve hours: a set of large cat prints moving north, a flattened area of dry grass where something lay down and rose, buffalo hoof prints deep enough to show the weight was wet. They crossed after rain. Your guests have not seen anything yet. But you are already reading last night.",
  notices: [
    { strong: "Start with the substrate", detail: "Soft mud, fine sand, and dust hold tracks well. Hard dry ground and rock hold almost nothing. Knowing substrate type helps you calibrate your expectation and explains to guests why some areas are productive tracking ground and others are not." },
    { strong: "Gait reveals context", detail: "Walking prints are spaced evenly and show clear heel and toe. Running prints show long strides, irregular spacing, and often show only the toe end of the foot. A sudden change from walking to running gait is a story in itself. Something happened at that point." },
    { strong: "Track age is a skill that takes field time", detail: "Fresh tracks in dry sand show sharp crisp edges. Older tracks have wind-eroded edges and may show debris blown in. Tracks in wet mud dry and harden over several hours. Track age estimation requires knowledge of recent weather conditions, which is why guides track the last rainfall and wind carefully." },
    { strong: "Scat, marks, and feeding sign complete the picture", detail: "Dung indicates species, diet, and approximate time. Claw or tusk marks on trees show territorial behaviour and species. Chewed bark height indicates the species. Low broken-off branches suggest browsers, high bark stripping up to 4 metres suggests elephant or giraffe." }
  ],
  mattersText: "CyberTracker Level 1 is the international standard for track and sign assessment. It requires you to identify species from tracks and signs, and to interpret the story a track sequence tells. Ground tracking on foot is one of the activities guests talk about most. It requires slow movement and close attention, which changes the rhythm of the experience entirely.",
  mistake: "Beginning trackers often fixate on one perfect print and miss the sequence. A single clear lion print tells you a lion was here. A sequence of prints tells you direction, speed, when they turned, where they paused, and what they were responding to. Always look for the track line before you bend down to examine any individual print.",
  quiz: [
    {
      q: "You find a clear set of cat prints in dry sand. The prints are round with four toes and no claw marks. The front print measures approximately 10cm across. What species is most consistent with this description and what would help confirm it?",
      options: [
        "Cheetah: look for partial claw marks in the track.",
        "Leopard: check gait pattern and look for scent marks on nearby trees.",
        "Lion: compare stride length and look for the tail drag mark.",
        "Domestic cat: 10cm is within the large domestic cat range."
      ],
      correct: 2,
      explanation: "A round print with 10cm width and no claw marks is consistent with a leopard front foot. Lion front prints are typically 11-13cm across. Cheetah prints, though similar in shape, almost always show partial claw marks because cheetah claws are only semi-retractile. Stride length and the presence of scent-marking trees or scrapes nearby would strengthen a leopard identification."
    }
  ],
  drill: "Find sand, mud, or soft earth and make your own clear footprint. Then make a second print at running pace. Photograph both and look at the difference in: depth, toe spread, heel clarity, and overall shape. Then find an ant or insect trail and follow it: see if you can determine where it started, where it ended, and why it changed direction."
},

{
  id: 12,
  group: "Conservation",
  title: "Conservation: Why It Matters and How It Works",
  purpose: "Understand the conservation context you are entering (legally, ecologically, and historically) so that you can speak about it honestly with guests.",
  scene: "A guest on your evening drive says: 'I read that they are going to cull the elephant population in this park. Is that true? Do you agree with it?' You have a vehicle full of people with different opinions, a complex topic with no simple answer, and about ninety seconds before someone fills the silence with an uninformed comment. What do you say?",
  notices: [
    { strong: "Conservation is a management discipline, not just wildlife protection", detail: "Protected areas are actively managed. Carrying capacity, water provision, fire management, invasive species control, and human-wildlife conflict are all ongoing decisions. A national park is not a place where nature is left alone. It is a complex managed system." },
    { strong: "South Africa holds around 80% of the world's remaining rhino", detail: "This creates enormous pressure. Understanding the poaching economics (demand from certain Asian markets, organised criminal networks, high prices per kilogram of horn) is essential context for any serious conversation about conservation." },
    { strong: "Community buy-in determines the long-term viability of any reserve", detail: "Reserves that generate no economic benefit for surrounding communities face higher poaching pressure and land-use conflict. Community conservancies, benefit-sharing agreements, and ecotourism employment are not only ethical choices. They are conservation tools." },
    { strong: "The Makuleke land claim is a landmark case worth knowing", detail: "The Makuleke community was forcibly removed from their land in 1969 to expand the Kruger National Park. In 1998, they won their land back in the first successful land claim within a national park. They now run the land as a contractual national park with tourism concessions. It is a model case for coexistence." }
  ],
  mattersText: "Guests will ask you hard questions about culling, poaching, land rights, and climate change. You do not need to have a perfect answer, but you need to frame the complexity honestly, without pretending it is simple and without political advocacy. The guide's role is to give guests a more accurate picture of reality than they arrived with.",
  mistake: "New guides sometimes avoid conservation controversy to stay safe with guests. This produces thin, unconvincing responses. A better approach: acknowledge the complexity, give context (why this is a hard problem), and distinguish between what the science shows and what is a values question. Guests respect honesty more than a clean corporate answer.",
  quiz: [
    {
      q: "A guest asks whether dehorning rhinos is ethical and whether it works. What is the most accurate and useful response?",
      options: [
        "It is fully effective and all rhinos should be dehorned.",
        "It is cruel and should be stopped.",
        "The evidence is mixed: dehorning reduces the value of an individual rhino to poachers and has reduced poaching in some areas, but it carries welfare risks during the procedure and requires ongoing maintenance. It is one tool among several.",
        "Dehorning has no effect because poachers are unaware of it."
      ],
      correct: 2,
      explanation: "This is exactly the kind of question where honest complexity is more useful than a clean answer. Dehorning is used in some reserves and has shown some success in reducing targeted poaching of known individuals. It involves anaesthesia and a procedure that carries risk. The horn regrows in 18-24 months. It is most effective combined with intensive monitoring and anti-poaching operations. No single intervention solves the rhino crisis."
    }
  ],
  drill: "Read the Wikipedia article on Peace Parks Foundation. Identify: (1) who founded it and when, (2) what a Transfrontier Conservation Area (TFCA) is, and (3) name one TFCA and which countries it connects. Then find one criticism of the peace parks model and write one sentence summarising it fairly."
},

{
  id: 13,
  group: "Night Sky and Navigation",
  title: "Astronomy and Navigation",
  purpose: "Find south without a compass, understand lunar cycles, and use the night sky as a guiding storytelling resource.",
  scene: "It is the first night drive of a four-night stay. The guests step out of the vehicle at a clearing, the engine cuts, and the guide kills the lights. The Milky Way appears overhead, a dense band of light arching across the sky. One guest says quietly 'I have never seen anything like that.' You have about five minutes before they start asking for their phones. What you say now will be one of the things they remember for the rest of their lives.",
  notices: [
    { strong: "Finding south with the Southern Cross", detail: "Locate the four stars forming the Southern Cross (Crux). Find the long axis: from Gamma Crucis (the fainter top star) to Alpha Crucis (the brightest bottom star). Extend this line 4.5 times its own length toward the horizon. That point on the horizon is due south. The two pointer stars (Alpha and Beta Centauri) also point toward the Cross and can be used to confirm it." },
    { strong: "The Milky Way is our own galaxy seen edge-on", detail: "On a dark night you are looking at the disc of a galaxy containing between 100 and 400 billion stars, most of them too distant to see individually. The dark patches within the Milky Way are dust clouds, not gaps. The San people of southern Africa call these dark patches the 'dark constellation': a complete alternative mythology of animals outlined by darkness rather than stars." },
    { strong: "Lunar cycles affect animal behaviour measurably", detail: "Around full moon, lions hunt more actively late at night because visibility improves for them too. Impala and other prey animals are more vigilant and move less during full moon nights. At new moon, activity compresses into the darker early evening hours. Knowing the moon phase before a night drive helps you predict what kind of activity to expect and when." },
    { strong: "The dung beetle navigation story connects astronomy to ecology", detail: "Dung beetles orient their rolling by the Milky Way. They are the only animal known to use the galaxy as a compass. Under cloud cover, their rolling direction becomes random. This is one of the most elegant connection points between the astronomy module and the arthropod module." }
  ],
  mattersText: "The astronomy module is often where guests have their strongest experiences on the trip, not at a lion kill but standing under a completely dark sky and understanding for the first time where they are in the universe. Do not underestimate it. Invest time in knowing it well.",
  mistake: "Guides sometimes rush through astronomy to get back to animals. The sky above a Lowveld clearing on a moonless night is one of the most striking things most guests will ever see. Slow down here.",
  quiz: [
    {
      q: "A guest asks how the dung beetle knows which direction to roll its dung ball at night. What is the most accurate answer?",
      options: [
        "It follows the smell of its starting point.",
        "It uses the earth's magnetic field, similar to a compass.",
        "It orients by the Milky Way, the only animal known to navigate by the galaxy.",
        "It has no directional sense and rolls randomly."
      ],
      correct: 2,
      explanation: "Research published in 2013 confirmed that dung beetles navigate by the Milky Way. When the galactic band is obscured (by a hat on the beetle's head in the study, or by cloud cover in practice), their paths become random. They climb to the top of their dung ball and perform a short orientation 'dance' before setting off."
    }
  ],
  drill: "Download the Stellarium app and set your location to Hoedspruit, South Africa. Find the Southern Cross and practise extending the long axis to find south. Then turn on 'atmosphere' settings and watch how the sky looks at different hours of a July night, and how different it looks in December when the Milky Way core is directly overhead."
},

{
  id: 14,
  group: "Reptiles",
  title: "Reptiles: Snakes, Monitors, and Crocodiles",
  purpose: "Identify the key reptiles of the Lowveld, understand the genuine risk profile for snakes, and use reptiles effectively as a guiding tool.",
  scene: "You are on a bush walk. A guest suddenly stops and points. There is a large brown snake about two metres off the path, lying in dappled shade. It has not moved. From your position you can see it is thick-bodied, with a broad triangular head, camouflaged against the dead leaves. Everyone is looking at you.",
  notices: [
    { strong: "Correct identification before anything else", detail: "In the scenario above: thick body, broad triangular head, heavy camouflage, motionless. This is a puff adder profile. The puff adder is responsible for more snakebite fatalities in southern Africa than any other species, not because its venom is the most potent, but because it is slow-moving, perfectly camouflaged, and does not flee when approached." },
    { strong: "The venomous priority species for the Lowveld", detail: "Puff adder (cytotoxic, most common bite). Black mamba (neurotoxic, fastest land snake, highly dangerous). Mozambique spitting cobra (cytotoxic plus can spit venom up to 2.5 metres, aiming for eyes). Boomslang (haemotoxic, rear-fanged, rarely bites but potent). These four require different awareness and response protocols." },
    { strong: "Monitors are not dangerous but are frequently misread", detail: "The water monitor (Varanus niloticus) and rock monitor (Varanus albigularis) are large, imposing lizards that guests often fear. They are opportunistic feeders on eggs, carrion, and small animals. They will flee from humans and only scratch or bite if physically restrained. They are good tracking subjects and their presence near water is worth noting." },
    { strong: "Nile crocodiles are misunderstood as predictably dangerous", detail: "Crocodiles are not indiscriminate killers. They are ambush predators that attack primarily from water within striking distance of the bank. The risk is specific and manageable: never walk to the water's edge in crocodile water without scanning carefully. Crocodiles are most dangerous in muddy or vegetation-obscured banks where their camouflage is complete." }
  ],
  mattersText: "Reptiles are highly effective with guests who are nervous about them: the guide who can explain how a snake's heat-sensing pits work, why the puff adder does not flee, or how a crocodile can hold its breath for over an hour: the result is usually curiosity rather than fear. Reptile literacy makes you a better guide.",
  mistake: "Beginners sometimes identify snakes wrongly from a distance and speak with false confidence. If you are not certain, say you are not certain. Tell guests what you observe: thick body, triangular head, not moving. Then explain why that means you are treating it with maximum caution regardless of exact species.",
  idGallery: [
    { src: "Puff adder", label: "Puff Adder" },
    { src: "Black mamba", label: "Black Mamba" },
    { src: "Mozambique spitting cobra", label: "Mozambique Spitting Cobra" },
    { src: "Nile monitor", label: "Water Monitor" },
    { src: "Leopard tortoise", label: "Leopard Tortoise" },
    { src: "Nile crocodile", label: "Nile Crocodile" }
  ],
  quiz: [
    {
      q: "A guest is spat at by a snake. Some liquid has hit near their left eye. What is the immediate correct action?",
      options: [
        "Apply antivenin topically to the eye.",
        "Flush the eye with large volumes of clean water immediately and continuously.",
        "Cover the eye and get to a hospital without touching it.",
        "Apply a cold compress and monitor."
      ],
      correct: 1,
      explanation: "The Mozambique spitting cobra's venom is cytotoxic and will cause severe corneal damage if not removed quickly. Large volumes of clean water is the immediate treatment. Not antivenin, not milk, not eye drops. Hold the eye open and pour water continuously. Do not rub. Get to medical care as soon as the eye has been thoroughly flushed."
    }
  ],
  drill: "Find images of a puff adder, black mamba, Mozambique spitting cobra, and boomslang. For each one, note: body thickness, head shape, colour pattern, and most likely habitat. Then look at photographs taken from further away and try to identify each species from the body shape alone, before you can see detail. This is what field identification actually looks like."
},

{
  id: 15,
  group: "Amphibians and Fish",
  title: "Amphibians: Sound as an Ecological Indicator",
  purpose: "Use frog calls and amphibian diversity as an ecological diagnostic tool, and identify the key Lowveld species by sound.",
  scene: "It is 8pm on the first night of the November rains. The vehicle is parked near a dam. The engine is off. The air smells of petrichor: that specific smell of rain on dry earth. The noise is immediate and everywhere. Dozens of species calling simultaneously. Your guests are trying to identify individual calls but the sound is a wall. You can separate three of them without moving.",
  notices: [
    { strong: "Amphibians have permeable skin: they are environmental sensors", detail: "Because amphibians absorb water and oxygen through their skin rather than drinking, they are acutely sensitive to water chemistry, pH, and pollution. A diverse frog community indicates healthy, unpolluted water. A simplified or absent frog community is an early warning for water quality degradation." },
    { strong: "Call recognition is assessed", detail: "The frog call assessment tests whether you can identify species from sound alone. The African bullfrog's deep resonant call, the painted reed frog's high cricket-like chirp, the foam nest tree frog's raspy call from above the water surface, and the common platanna's underwater clicking are all distinct and learnable." },
    { strong: "The foam nest tree frog is one of the best guiding subjects in the wet season", detail: "The female foam nest tree frog (Chiromantis xerampelina) builds a foam nest in a tree branch overhanging water. Multiple males attend the nest. The eggs develop in the foam which insulates them from heat and desiccation. When the tadpoles hatch, the foam liquefies and they fall into the water below. This is not a widely known story. Use it." },
    { strong: "Fish are primarily ecological indicators and food web components", detail: "Knowing the key Lowveld fish species: tigerfish, yellowfish, and sharptooth catfish: matters less for sightings than for explaining food web connections: fish support fish eagles, herons, crocodiles, and otters. Fish diversity indicates river health." }
  ],
  mattersText: "The first post-rain night of the wet season is one of the most acoustically extraordinary experiences in the Lowveld. Being able to name and explain three or four calls in that context transforms the experience for guests who might otherwise just hear 'noise.'",
  mistake: "Most guiding emphasis goes to mammals and birds. Amphibians and fish are sometimes treated as box-ticking modules. But a guide who can narrate the foam nest tree frog's reproductive strategy from scratch has a strong story available that almost no guest has ever heard.",
  quiz: [
    {
      q: "You find a foam nest attached to a branch about two metres above a pool. The nest is dry and appears old. The pool below is completely dry. What does this observation tell you?",
      options: [
        "The nest failed and the tadpoles died.",
        "The nest was built last season: this is the correct location for the tree frogs and the area likely floods during the wet season.",
        "This species makes dry nests that never contained water.",
        "The nest was washed up by flooding."
      ],
      correct: 1,
      explanation: "Foam nest tree frogs build their nests above seasonal pools that are dry or very low in the dry season. The nest position shows where water will be when the rains come. An old dry nest is evidence of the species and tells you this pool will fill, which is itself useful information."
    }
  ],
  drill: "Search YouTube for 'South African frog calls' and find recordings of the foam nest tree frog, African bullfrog, and painted reed frog. Listen to each recording three times without looking at the name. Then see if you can match each call to its description: 'deep resonant grunt', 'high insect-like chirp', 'raspy churring from above water'. Use the Frog ID app (South Africa) if available."
},

{
  id: 16,
  group: "Arthropods",
  title: "Arthropods: The Backbone of the Ecosystem",
  purpose: "Use insects, spiders, and arachnids as guiding tools. The organisms most guests overlook are often the ones with the most interesting stories.",
  scene: "It is midday in November. The heat is intense. Your guests have seen very little for the past hour. Most large mammals are resting in shade. You stop next to a large active termite mound. You cut the engine. You tell your guests to watch, listen, and then start asking questions. Within five minutes, they have found a banded mongoose foraging around the base, a yellow-billed hornbill watching from a branch above, and a rock monitor sunning on the south face. The termite mound became the entire lesson.",
  notices: [
    { strong: "Termite mounds are habitat infrastructure", detail: "A single large mound supports its own microhabitat: specific soil bacteria, fungi farms cultivated by the termites themselves, insect communities that live only in mound soil, and a sequence of above-ground tenants from monitors to mongoose to owls. Understanding mound ecology connects half of your terrestrial mammal and bird knowledge." },
    { strong: "Dung beetles connect astronomy, ecology, and behaviour", detail: "Dung beetles roll dung in a straight line using the Milky Way as a compass. They disperse seeds, aerate soil, and reduce parasite loads in dung. The Scarabaeus sacer was sacred to ancient Egyptians for its ball-rolling behaviour, which they associated with the sun. This is a story with history, ecology, and astronomy in one small package." },
    { strong: "Scorpions fluoresce under UV light", detail: "Scorpions contain fluorescent compounds in their exoskeleton that glow blue-green under ultraviolet light. A UV torch on a night walk transforms an otherwise invisible scorpion into something unmistakable. This is one of the most reliably dramatic night walk moments available to any guide, anywhere." },
    { strong: "Fig wasps are an evolutionary story worth knowing", detail: "Every fig species has its own specific fig wasp species: and neither can reproduce without the other. The wasp enters through a tiny opening, pollinates the fig, lays eggs inside, and the next generation exits through the same opening. This is obligate mutualism: if either species goes locally extinct, the other follows. It makes the fig story far more interesting than it first appears." }
  ],
  mattersText: "The arthropod module rewards guides who invest in it disproportionately. Most guests have seen elephants in photographs their whole lives. Almost no guest has ever heard the termite mound story, the dung beetle navigation story, or the fig wasp story told well. This is your competitive edge as a guide.",
  mistake: "Beginners dismiss arthropods as a box-ticking module and spend minimal preparation time on them. The result is that they can name a dung beetle but cannot tell the navigation story. The name without the story is the least interesting version of this material.",
  quiz: [
    {
      q: "You show a guest a large rain spider on the wall of the lodge at night. The guest is alarmed and asks if it is dangerous. What is the accurate response?",
      options: [
        "Yes, rain spiders are highly venomous and should be removed.",
        "Rain spiders are large but their venom is not medically significant to humans. They are beneficial: they hunt cockroaches and other insects.",
        "Only the females are dangerous.",
        "Avoid touching it but it is harmless if left alone."
      ],
      correct: 1,
      explanation: "Rain spiders (Palystes species) are large and alarming in appearance: females can reach a legspan of 12cm or more, but they are not considered medically dangerous to healthy adults. A bite causes local pain and swelling but no systemic toxicity. They are active, beneficial predators and are genuinely useful to have around a lodge. This is an excellent example of turning guest fear into a story."
    }
  ],
  drill: "Find a large rock or log in your garden or local park and lift it carefully. Before you move anything, observe everything underneath: count the species you can see, note what they are doing, and note the relationships: is anything eating anything else, is anything sheltering under something else? That is small-scale ecology. Replace the rock exactly as you found it."
},

{
  id: 17,
  group: "Guiding Readiness",
  title: "Field Readiness and Professional Practice",
  purpose: "Understand the practical, legal, and physical preparation required to operate as a competent and legal nature guide in South Africa.",
  scene: "You are three weeks from your practical assessment. Your theory exam is complete. You can identify the trees, the birds, the mammals. But your assessor will be watching something else: how you brief guests, how you position the vehicle, how you manage a tense moment when an elephant approaches closer than expected, and whether your decisions prioritise safety without breaking the experience. None of that is in a field guide.",
  notices: [
    { strong: "CATHSSETA registration is the legal requirement", detail: "To guide paying guests legally in South Africa you must hold a registered Nature Site Guide qualification through CATHSSETA. Operating without registration is a criminal offence. This means the paper certificate is not optional. It is the licence." },
    { strong: "First aid certification is compulsory", detail: "A valid first aid certificate is required before assessment. The wilderness first aid requirements cover basic life support, wound management, heat and cold illness, snake bite protocol, and emergency evacuation planning. In remote bush environments, you are the first responder." },
    { strong: "SASSETA firearm proficiency for foot walks in dangerous game areas", detail: "To lead walks in areas with elephant, buffalo, rhino, lion, or leopard, you must hold a SASSETA-registered firearm proficiency certificate for the calibre carried. This involves formal training, live firing assessment, and registration. Knowing how to handle a rifle is not enough." },
    { strong: "The assessment is a live guided experience, not a written exam", detail: "The practical assessment involves guiding a group (which includes the assessor) through a real experience and being evaluated on interpretation, safety management, vehicle or walking protocols, guest management, and ecological accuracy. Knowing the content is necessary but not sufficient." }
  ],
  mattersText: "Professional readiness is the difference between a person who knows a lot about the bush and a person who can operate safely, legally, and effectively as a guide. The preparation required is substantial. Allow time for first aid training, firearm certification, and practical guided hours before your assessment.",
  mistake: "Students sometimes focus entirely on species knowledge and neglect the operational skills: how to brief guests before a walk, what to do if someone in the vehicle is having a medical emergency, how to resolve a vehicle breakdown in a dangerous game area. These are not edge cases. They are regular events in a working guide's life.",

let currentId = 1;
let completed = new Set();
let answered = {}; // { lessonId_qIndex: selectedOption }


// ===================================================================
//  RENDER NAV
// ===================================================================

function renderNav() {
  const container = document.getElementById('navContainer');
  const groups = {};
  lessons.forEach(l => {
    if (!groups[l.group]) groups[l.group] = [];
    groups[l.group].push(l);
  });

  // Desktop sidebar — collapsible groups
  let sidebarHtml = '';
  Object.keys(groups).forEach(g => {
    const hasActive = groups[g].some(l => l.id === currentId);
    sidebarHtml += `
      <div class="nav-group ${hasActive ? '' : ''}" id="navgroup-${g.replace(/\s+/g,'-')}">
        <div class="nav-group-header" onclick="toggleNavGroup('navgroup-${g.replace(/\s+/g,'-')}')">
          <div class="nav-group-label">${g}</div>
          <span class="nav-group-chevron">&#9660;</span>
        </div>
        <div class="nav-group-items">`;
    groups[g].forEach(l => {
      sidebarHtml += `
          <div class="nav-item ${l.id === currentId ? 'active' : ''} ${completed.has(l.id) ? 'completed' : ''}"
            onclick="showLesson(${l.id})"
            onkeydown="if(event.key==='Enter'||event.key===' ')showLesson(${l.id})"
            tabindex="0"
            role="button"
            aria-pressed="${l.id === currentId}"
            data-id="${l.id}">
            <span class="nav-item-num">${String(l.id).padStart(2,'0')}</span>
            <span class="nav-item-text">${l.title}</span>
            <span class="nav-item-check" aria-hidden="true"></span>
          </div>`;
    });
    sidebarHtml += `</div></div>`;
  });
  container.innerHTML = sidebarHtml;

  // Mobile bottom sheet — same groups, different markup
  renderSheet();
}

function renderSheet() {
  const groups = {};
  lessons.forEach(l => {
    if (!groups[l.group]) groups[l.group] = [];
    groups[l.group].push(l);
  });
  let html = '';
  Object.keys(groups).forEach(g => {
    html += `<div class="sheet-group">
      <div class="sheet-group-label">${g}</div>
      <div class="sheet-cards">`;
    groups[g].forEach(l => {
      html += `<div class="sheet-card ${l.id === currentId ? 'active' : ''} ${completed.has(l.id) ? 'completed' : ''}"
        onclick="sheetNav(${l.id})"
        onkeydown="if(event.key==='Enter'||event.key===' ')sheetNav(${l.id})"
        tabindex="0" role="button" aria-pressed="${l.id === currentId}"
        data-sheet-id="${l.id}">
        <span class="sheet-card-num">${String(l.id).padStart(2,'0')}</span>
        <span class="sheet-card-title">${l.title}</span>
        <span class="sheet-card-done" aria-hidden="true"></span>
      </div>`;
    });
    html += `</div></div>`;
  });
  const body = document.getElementById('sheetBody');
  if (body) body.innerHTML = html;
}

function toggleNavGroup(id) {
  document.getElementById(id).classList.toggle('collapsed');
}

function openSheet() {
  document.getElementById('bottomSheet').classList.add('open');
  document.getElementById('sheetOverlay').classList.add('visible');
}

function closeSheet() {
  document.getElementById('bottomSheet').classList.remove('open');
  document.getElementById('sheetOverlay').classList.remove('visible');
}

function sheetNav(id) {
  closeSheet();
  setTimeout(() => showLesson(id), 80);
}

function updateProgress() {
  const pct = Math.round((completed.size / lessons.length) * 100);
  const fill = document.getElementById('progressFill');
  const text = document.getElementById('progressText');
  const sheetText = document.getElementById('sheetProgressText');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = `${completed.size} of ${lessons.length} lessons read`;
  if (sheetText) sheetText.textContent = `${completed.size} of ${lessons.length} read`;
}


// ===================================================================
//  RENDER LESSON
// ===================================================================

function buildLessonArc(l) {
  const steps = ['Field scene', 'What to notice'];
  if (l.idGallery && l.idGallery.length) steps.push('Visual reference');
  if (l.mattersText) steps.push('Why it matters');
  if (l.compareGrid) steps.push('Compare');
  if (l.mistake) steps.push('Common mistake');
  if (l.quiz && l.quiz.length) steps.push('Knowledge check');
  if (l.drill) steps.push('Practical drill');
  return `<div class="lesson-arc">${steps.map(s => `<span class="arc-step">${s}</span>`).join('<span class="arc-sep">·</span>')}</div>`;
}

function speciesImg(wikiTitle, alt, cls) {
  if (!wikiTitle) return `<span class="img-placeholder">${alt}</span>`;
  return `<img class="${cls}" data-wiki="${wikiTitle}" src="" alt="${alt}" loading="lazy" onerror="imgFallback(this)">`;
}

function buildLessonHTML(l) {
  const idx = lessons.findIndex(x => x.id === l.id);
  const lessonNum = idx + 1;

  let html = `
    <div class="lesson-meta"><span class="lesson-num">Lesson ${lessonNum} of ${lessons.length}</span><span class="lesson-group-tag">${l.group}</span></div>
    <h1 class="lesson-title">${l.title}</h1>
    <div class="lesson-purpose">${l.purpose}</div>
    ${buildLessonArc(l)}

    <div class="field-scene">
      <div class="field-scene-label">Field scene</div>
      <div class="field-scene-text">${l.scene}</div>
    </div>
  `;

  if (l.notices && l.notices.length) {
    html += `<div class="section"><div class="section-label">What to notice</div><ul class="notice-list">`;
    l.notices.forEach(n => {
      html += `<li class="notice-item"><div class="notice-content">
        <span class="notice-strong">${n.strong}</span>`;
      if (n.imgs && n.imgs.length) {
        html += `<span class="notice-detail">${n.detail || ''}</span><div class="notice-img-wrap">`;
        n.imgs.forEach(img => {
          html += `<div class="notice-img-block">
            ${speciesImg(img.src, img.alt, 'notice-img')}
            <span class="notice-img-caption">${img.alt}</span>
          </div>`;
        });
        html += `</div>`;
      } else {
        html += `<span class="notice-detail">${n.detail || ''}</span>`;
      }
      html += `</div></li>`;
    });
    html += `</ul></div>`;
  }

  if (l.idGallery && l.idGallery.length) {
    html += `<div class="section"><div class="section-label">Visual reference</div><div class="id-gallery">`;
    l.idGallery.forEach(item => {
      html += `<div class="id-gallery-item">
        ${speciesImg(item.src, item.label, 'id-gallery-img')}
        <span class="id-gallery-label">${item.label}</span>
      </div>`;
    });
    html += `</div></div>`;
  }

  if (l.mattersText) {
    html += `<div class="section"><div class="section-label">Why it matters in the field</div><div class="body-text">${l.mattersText}</div></div>`;
  }

  if (l.compareGrid) {
    const hasImgs = l.compareGrid.imgs && (l.compareGrid.imgs[0] || l.compareGrid.imgs[1]);
    html += `<div class="section"><div class="section-label">Compare and contrast</div>
      <div style="overflow-x:auto;border:1px solid var(--line-2);border-radius:var(--radius);">
      <table class="compare-table">
        <thead>
          <tr>
            <th style="width:0;border-right:1px solid var(--line-2);background:var(--paper-2)"></th>`;

    [0, 1].forEach(i => {
      const isB = i === 1;
      html += `<th class="${isB ? 'col-b' : 'col-a'}">`;
      if (hasImgs && l.compareGrid.imgs[i]) {
        html += `<div class="compare-img-cell">${speciesImg(l.compareGrid.imgs[i], l.compareGrid.heading[i], 'compare-header-img')}<div class="compare-th-label">${l.compareGrid.heading[i]}</div></div>`;
      } else {
        html += l.compareGrid.heading[i];
      }
      html += `</th>`;
    });

    html += `</tr></thead><tbody>`;

    l.compareGrid.rows.forEach(r => {
      html += `<tr>
        <td></td>
        <td class="col-a">${r[0]}</td>
        <td class="col-b">${r[1]}</td>
      </tr>`;
    });

    html += `</tbody></table></div></div>`;
  }

  if (l.mistake) {
    html += `<div class="section">
      <div class="mistake-box">
        <div class="mistake-label">Common beginner mistake</div>
        <div class="mistake-text">${l.mistake}</div>
      </div>
    </div>`;
  }

  if (l.quiz && l.quiz.length) {
    html += `<div class="check-section">
      <div class="check-header">Knowledge check</div>`;
    l.quiz.forEach((q, qi) => {
      const key = `${l.id}_${qi}`;
      const selected = answered[key];
      html += `<div class="question" id="q-${l.id}-${qi}">
        <div class="question-text">${qi + 1}. ${q.q}</div>
        <div class="options">`;
      const ltrs = ['A','B','C','D'];
      q.options.forEach((opt, oi) => {
        let cls = 'option-btn';
        let dis = '';
        if (selected !== undefined) {
          dis = 'disabled';
          cls += ' revealed';
          if (oi === q.correct) cls += ' correct';
          else if (oi === selected && oi !== q.correct) cls += ' wrong';
        }
        html += `<button class="${cls}" data-letter="${ltrs[oi]}" ${dis}
          onclick="answerQuestion(${l.id}, ${qi}, ${oi}, ${q.correct})">${opt}</button>`;
      });
      html += `</div>
        <div class="answer-reveal ${selected !== undefined ? 'show' : ''}" id="reveal-${l.id}-${qi}">
          ${q.explanation}
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (l.drill) {
    html += `<div class="section">
      <div class="drill-box">
        <div class="drill-label">Practical drill</div>
        <div class="drill-text">${l.drill}</div>
      </div>
    </div>`;
  }

  const prev = idx > 0 ? lessons[idx - 1] : null;
  const next = idx < lessons.length - 1 ? lessons[idx + 1] : null;
  const isDone = completed.has(l.id);

  html += `<div class="lesson-footer">
    <div class="nav-arrows">
      <button class="nav-arrow" onclick="showLesson(${prev ? prev.id : ''})" ${!prev ? 'disabled' : ''} aria-label="${prev ? 'Previous: ' + prev.title : 'No previous lesson'}">
        &larr; ${prev ? prev.title : ''}
      </button>
      <button class="nav-arrow" onclick="showLesson(${next ? next.id : ''})" ${!next ? 'disabled' : ''} aria-label="${next ? 'Next: ' + next.title : 'No next lesson'}">
        ${next ? next.title : ''} &rarr;
      </button>
    </div>
    <button class="mark-done-btn ${isDone ? 'done' : ''}" onclick="markDone(${l.id})" aria-pressed="${isDone}">
      ${isDone ? '✓ Completed' : 'Mark as read'}
    </button>
  </div>`;

  return html;
}

function renderAllLessons() {
  const container = document.getElementById('mainContent');
  container.innerHTML = lessons.map(l =>
    `<div class="lesson-page ${l.id === currentId ? 'active' : ''}" id="lesson-${l.id}">
      ${buildLessonHTML(l)}
    </div>`
  ).join('');
}


// ===================================================================
//  INTERACTIONS
// ===================================================================

function showLesson(id) {
  if (!id) return;
  currentId = id;

  // Swap lesson page
  document.querySelectorAll('.lesson-page').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('lesson-' + id);
  if (page) {
    page.classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
    resolveAllImages();
  }

  // Update desktop sidebar active state
  document.querySelectorAll('.nav-item').forEach(item => {
    item.classList.toggle('active', parseInt(item.dataset.id) === id);
  });

  // Update mobile top bar
  const lesson = lessons.find(l => l.id === id);
  if (lesson) {
    const tg = document.getElementById('topbarGroup');
    const tt = document.getElementById('topbarTitle');
    if (tg) tg.textContent = lesson.group;
    if (tt) tt.textContent = lesson.title;
  }

  // Update sheet active state
  document.querySelectorAll('.sheet-card').forEach(item => {
    item.classList.toggle('active', parseInt(item.dataset.sheetId) === id);
  });
}

function answerQuestion(lessonId, qIndex, selected, correct) {
  const key = `${lessonId}_${qIndex}`;
  if (answered[key] !== undefined) return;
  answered[key] = selected;

  const container = document.getElementById(`q-${lessonId}-${qIndex}`);
  const buttons = container.querySelectorAll('.option-btn');
  buttons.forEach((btn, i) => {
    btn.disabled = true;
    btn.classList.add('revealed');
    if (i === correct) btn.classList.add('correct');
    else if (i === selected && i !== correct) btn.classList.add('wrong');
  });

  const reveal = document.getElementById(`reveal-${lessonId}-${qIndex}`);
  if (reveal) reveal.classList.add('show');
}

function markDone(id) {
  completed.add(id);
  const btn = document.querySelector(`#lesson-${id} .mark-done-btn`);
  if (btn) {
    btn.textContent = '✓ Completed';
    btn.classList.add('done');
    btn.setAttribute('aria-pressed', 'true');
  }

  // Desktop sidebar
  document.querySelectorAll('.nav-item').forEach(item => {
    if (parseInt(item.dataset.id) === id) item.classList.add('completed');
  });

  // Mobile sheet
  document.querySelectorAll('.sheet-card').forEach(item => {
    if (parseInt(item.dataset.sheetId) === id) item.classList.add('completed');
  });

  updateProgress();

  const idx = lessons.findIndex(l => l.id === id);
  const next = lessons[idx + 1];
  if (next) {
    setTimeout(() => showLesson(next.id), 300);
  }
}





// ===================================================================
//  INIT
// ===================================================================

renderNav();
renderAllLessons();
updateProgress();
resolveAllImages();

</script>
</body>
</html>
